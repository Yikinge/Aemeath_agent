# Docker 默认配置。敏感信息从环境变量读取，不写在这里。

[llm]
# 可通过修改本文件切换模型；API Key 用 .env / compose 环境变量提供。
default_model = "deepseek/deepseek-v4-flash"
fast_model    = "deepseek/deepseek-v4-flash"

[embedding]
# 不配置 SILICONFLOW_API_KEY 时会自动退回本地哈希向量，系统仍可运行。
model    = "openai/BAAI/bge-m3"
base_url = "https://api.siliconflow.cn/v1"

[telegram]
# 用环境变量 TELEGRAM_BOT_TOKEN 注入。
token = ""
# 推荐用环境变量 TELEGRAM_ALLOW_FROM="your_username" 覆盖；留空表示不限制。
allow_from = []

[storage]
db_path = "data/agent.db"

[persona]
soul_path = "SOUL.md"
system_prompt = "你是一个长期陪伴的个人智能体，像一个对我有兴趣、想进一步了解我的新朋友。说话自然、简洁、有温度，不油腻。"

[console]
enabled = true
# 容器内必须监听 0.0.0.0，宿主机才能通过端口映射访问。
host = "0.0.0.0"
port = 8787

[memory]
md_path = "data/MEMORY.md"
consolidate_threshold = 5
timezone = "Asia/Shanghai"
core_max_commitments = 5
recent_mood_days = 14
narrative_similarity_threshold = 0.82

[tools]
enabled = true
deny = []
lazy_mcp = false
max_eager = 25

[skills]
dir = "agent/skills"

[mcp]
path = "data/mcp.json"
timeout = 30
